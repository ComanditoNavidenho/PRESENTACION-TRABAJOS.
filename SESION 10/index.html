<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARALLAX</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background: black;
        }
        .contenedor{
            width: 400px;
            height: 700px;
            border:1px  solid white;
            overflow: hidden;
            margin: 0 auto;
            position: relative;
        }
        .paisaje{
            width: 800px;
            position: absolute;
            left: -150px;
            z-index: 2;
            animation: paisaje 20s 1 forwards;
        }
        .persona{
            width: 600px;
            position: absolute;
            left:-100px;
            z-index: 3;
            top: 300px;
            animation: persona 15s 1 forwards;
        }
        .cielo{
            width: 600px;
            top:0px;
            position: absolute;
            z-index: 1;
            filter: blur(5px);
            animation: cielo 25s 1 forwards;
        }
        .vapor{
            width: 200%;
            top: 330px;
            position: absolute;
            z-index: 4;
            animation: vapor 10s 1 forwards;
        }

        @keyframes cielo {
            from{
                scale:100%;
                filter: blur(5px);
            }
            to{
                scale:150%;
                filter: blur(0px);
            }
        }
        @keyframes paisaje {
            from{
                top: -10px;
                filter: blur(2px);
            }
            to{
                top: -100px;
                filter: blur(0px);
            }
        }
        @keyframes persona {
            from{
                top: 300px;
                filter: grayscale(100%);
            }
            to{
                top: 230px;
                scale: 150%;
                filter: grayscale(0%);
            }
        }
        @keyframes vapor {
            from{
                left:0px;

            }
            to{
                left: -400px;            
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <img class="cielo" src="img/cielo.png">
        <img class="paisaje" src="img/fondo.png">
        <img class="persona" src="img/persona.png">
        <img class="vapor" src="img/VAPOR.png">
    </div>
</body>
    <li> <a href="../index.html"> Inicio</a> </li>
</html>
