<html>
    <head>
        <style>
            *{
                margin:0px;
                padding: 0px;
            }
            .inicio{
                height: 50px;
                width: 100px;
                background-color: rgb(168, 11, 207);
                display: flex;
                justify-content: center;
                align-items: center;
            }
            body{
                background-color: black;
            }
            .contenedor{
                width: 400px;
                height: 700px;
                background-color: yellow;
                position: relative;
                overflow: hidden;
                margin:0 auto;
            }
            .cuadrito{
                width: 100px;
                height: 100px;
                background-image: url(img/COCO2.png);
                background-size: cover;
                position: absolute;
                left:250px;
                top:-100px;
                rotate: 10deg;
                animation: cuadrito 4s forwards 2s;
            }
            .cuadrito img{
                width: 100%;
            }
            @keyframes cuadrito{
                0%{
                    top:-100px;
                }
                80%{
                    top: 50px;
                    rotate:0deg;
                }
                100%{
                    top: -100px;
                    rotate:0deg;
                }
            }
            .cuadrito1{
                height: 100px;
                width: 100px;
                background-image: url(img/mitad_coco.png);
                background-size: cover;
                position: absolute;
                left:100px;
                top:-100px;
                animation: cuadrito1 4s forwards 2s;
            }
            @keyframes cuadrito1{
                0%{
                    top:-100px;
                }
                50%{
                    top:200px;
                    rotate:-10deg;
                }
                55%{
                    top:180px;
                }
                80%{
                    top:200px;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }

            .cuadrito2{
                height: 100px;
                width: 100px;
                background-image: url(img/mitad_coco.png);
                background-size: cover;
                position: absolute;
                left:50px;
                top:-100px;
                animation: cuadrito2 4s forwards 3s;
            }
            @keyframes cuadrito2{
                0%{
                    top:-100px;
                }
                50%{
                    top:400px;
                    rotate: 10deg;
                }
                55%{
                    top:450px;
                }
                80%{
                    top:480px;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
            .cuadrito3{
                height: 100px;
                width: 100px;
                background-image: url(img/mitad_coco2.png);
                background-size: cover;
                position: absolute;
                left:200px;
                top:-100px;
                animation: cuadrito3 4s forwards 3s;
            }
            @keyframes cuadrito3{
                0%{
                    top:-100px;
                }
                50%{
                    top:500px;
                    rotate: 10deg;
                }
                55%{
                    top:550px;
                }
                80%{
                    top:580px;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
            .rama{
                width: 400px;
                height: 500px;
                background-image: url(img/RAMA.png);
                background-size: cover;
                position: absolute;
                left:100px;
                top:-160px;
                rotate: 10deg;
                animation: rama 1.5s infinite alternate linear 4s;
            }
            @keyframes rama {
                from{
                    rotate:10deg;
                }
                to{
                    rotate:22deg;
                }
            }
            .cuadrito4{
                width: 200px;
                height: 200px;
                position: absolute;
                background-image: url(img/mitad_coco2.png);
                background-size: cover;
                top:-200px;
                left: 250px;
                animation: cuadrito4 4s forwards 1s;
            }
            @keyframes cuadrito4{
                0%{
                    top:-100px;
                }
                80%{
                    top:550px;
                    rotate:0deg;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
            .text1{
                width: 200px;
                height: 200px;
                font-size: 40px;
                font-family: "Agency FB";
                position: absolute;
                top: 200px;
                left: -350px;
                animation: text1 5s forwards linear 3s;
            }
            @keyframes text1{
                0%{
                    left:-350px;
                }
                90%{
                    left: 50px;
                }
                100%{
                    left: 400px;
                }
            }
            .text2{
                width: 300px;
                height: 300px;
                font-size: 50px;
                color: white;
                font-family: "Agency FB";
                position: absolute;
                top: 320px;
                left: -390px;
                animation: text2 5s forwards linear 4s;
            }
            @keyframes text2{
                0%{
                    left:-390px;
                }
                90%{
                    left: 50px;
                }
                100%{
                    left: 400px;
                }
            }
            .text3{
                width: 300px;
                height: 300px;
                font-size: 50px;
                color: white;
                font-family: "Agency FB";
                position: absolute;
                top: 470px;
                left: -390px;
                animation: text3 5s forwards linear 5s;
            }
            @keyframes text3{
                0%{
                    left:-390px;
                }
                90%{
                    left: 50px;
                }
                100%{
                    left: 400px;
                }
            }
        </style>
    </head>
    <body>
        <div class="inicio"><a href="../index.html">Atras</a></div>
        <div class="contenedor">
            <div class="rama"></div>
            <div class="cuadrito"></div>
            <div class="cuadrito1"></div>          
            <div class="cuadrito2"></div>            
            <div class="cuadrito3"></div>            
            <div class="cuadrito4"></div> 
            <div class="text1"><h2>YA PROBASTE</h2></div>
            <div class="text2"><h2>EL NUEVO</h2></div>
            <div class="text3"><h2>SABOR</h2></div>           
        </div>
    </body>
</html>
