<html>
<head>
    <title></title>
    <style>
    *{
        margin:0;
        padding:0;
    }
    .inicio{
            height: 100px;
            width: 100px;
            background-color: rgb(17, 1, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }
    #contenedor{
        width: 400px;
        height: 200px;
        border: 1px solid black;
        background-color: lightgray;
        position:relative;
        margin:0 auto; /*centrar el contenedor*/
        overflow: hidden; /*oculta todo lo que contiene*/
    }
    #cuadrito{
        width: 100px;
        height: 100px;
        position: absolute; /*Obligatorio para mover el div*/
        top:50px;
        left:-100px;

        animation: cuadrito 3s infinite;
        animation-timing-function: linear; /*define la forma de moverse*/
    }
    @keyframes cuadrito{
        from{
            left:-100px;
        }
        to{
            left:500px;
        }
    }

    #cuadrito img{
        width: 100px;
        height: 100px;
    }


    </style>
</head>
<body>
    <div class="inicio"><a href="../index.html">Atras</a></div>
    <div id="contenedor">

        <div id="cuadrito">

            <img src="img/megamanx.gif" alt="">

        </div>

    </div>
</body>
    <li> <a href="../index.html"> Inicio</a> </li>
</html>
