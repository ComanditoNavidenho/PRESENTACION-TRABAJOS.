<html>
    <head>
        <title></title>
        <style>
            *{
                margin:0;
                padding:0;
            }
            #contenedor{
                width: 400px;
                height: 200px;
                background-color: black;
                border: 1px solid black;
                position:relative;
                margin:0 auto; /*centrar contenedor*/
                overflow: hidden;/*oculta todo lo que contiene*/
            }
            #punto1{
                width: 5px;
                height: 5px;
                background-color: rgb(255, 255, 255);
                position: absolute;
                top: 50px;
                left:-100px;
                animation: cuadrito 3s infinite ease;
            }
            #punto2{
                width: 100px;
                height: 100px;
                background-color: rgb(255, 255, 255);
                position: absolute;
                top: 50px;
                left:-100px;
                animation: cuadrito 3s infinite ease;
            }
            #cuadrito{
                width: 100px;
                height: 100px;
                position: absolute;
                top: 50px;
                left:-100px;
                animation: cuadrito 3s infinite ease; /*define la forma de moverse*/
            }
            #cuadrito img{
                width: 150px;
                height: 100px;
            }
            @keyframes punto1{
                from{
                    right:-100px;
                }
                to{
                    right:500px;
                }
            }
            @keyframes cuadrito{
                from{
                    left:-100px;
                }
                to{
                    left:500px;
                }
            }
        </style>
    </head>
    <body>
          <div id="contenedor">
            <div id="punto"></div>
            <div id="cuadrito">
                <img src="img/gatoarcoiris.gif" alt="width:100px, height:100px">
            </div>
          </div>
    </body>
    <li> <a href="../index.html"> Inicio</a> </li>
</html>
