<html>
<head>
    <title>LENGUAJES PERSONIFICADOS</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#111;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .contenedor{
            width:800px;
            height:300px;
            border:3px solid #fff;
            margin:0 auto;
            position:relative;
            overflow:hidden;
            perspective:1000px;
        }

        .tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4{
            width:200px;
            height:300px;
            position:absolute;
            top:0;
            background-size:cover;
            background-position:center;
            opacity:0;
            transition:transform 0.6s ease, filter 0.6s ease;
        }

        .tarjeta1{
            background-image:url(img/HTML.jpg);
            left:0;
            animation:rebote 2s ease-out forwards;
        }

        @keyframes rebote{
            0% {  
            top: -300px;  
            opacity: 0;  
            transform: rotateY(-180deg) scale(0.3) skewX(-10deg);  
            filter: blur(10px);  
            }  
            40% {  
            top: 120px;  
            transform: rotateY(-720deg) scale(1.1) skewX(5deg);  
            filter: blur(0px);  
            }  
            70% {  
            top: -30px;  
            transform: rotateY(-900deg) scale(0.95);  
            }  
            100% {  
            top: 0px;  
            opacity: 1;  
            transform: rotateY(-1080deg) scale(1) skewX(0deg);  
            filter: blur(0px);  
            }  
        }

        .tarjeta2{
            background-image:url(img/CSS.jpg);
            left:200px;
            animation:giro3d 2s ease forwards;
            animation-delay:0.5s;
        }

        @keyframes giro3d{
            0%{
                transform:rotateY(180deg) scale(0.2);
                opacity:0;
            }
            100%{
                transform:rotateY(0deg) scale(1);
                opacity:1;
            }
        }

        .tarjeta3{
            background-image:url(img/JS.jpg);
            left:400px;
            animation:zoomBlur 2s ease forwards;
            animation-delay:1s;
        }

        @keyframes zoomBlur{
            0%{
                transform:scale(3);
                filter:blur(20px);
                opacity:0;
            }
            100%{
                transform:scale(1);
                filter:blur(0);
                opacity:1;
            }
        }

        .tarjeta4{
            background-image:url(img/BOOTSTRAP.jpg);
            left:600px;
            animation:slideRotate 2s ease forwards;
            animation-delay:1.5s;
        }

        @keyframes slideRotate{
            0%{
                transform:translateX(300px) rotate(360deg);
                opacity:0;
            }
            100%{
                transform:translateX(0) rotate(0deg);
                opacity:1;
            }
        }

        .tarjeta1:hover,
        .tarjeta2:hover,
        .tarjeta3:hover,
        .tarjeta4:hover{
            transform:scale(1.15) rotate(2deg);
            filter:brightness(1.2);
            transition: 1s;
            scale: 1.2;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div class="contenedor">
        <div class="tarjeta1"></div>
        <div class="tarjeta2"></div>
        <div class="tarjeta3"></div>
        <div class="tarjeta4"></div>
    </div>

</body>
</html>
